<!DOCTYPE html>
<html>
<head>
    <title>Connecting...</title>
</head>
<body>

<h2>Connecting your account...</h2>

<script>
const params = new URLSearchParams(window.location.hash.substring(1));
const token = params.get('token1');

async function saveClient() {
    if (!token) {
        document.body.innerHTML = '<h2>Authorization failed</h2>';
        return;
    }

    const res = await fetch('http://localhost:3000/api/save-client', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (data.success) {
        document.body.innerHTML = `
            <h2>Account Linked Successfully</h2>
            <p>Welcome ${data.client.loginid}</p>
        `;
    } else {
        document.body.innerHTML = '<h2>Connection failed</h2>';
    }
}

saveClient();
</script>

</body>
</html>
