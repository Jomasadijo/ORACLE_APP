<script>
const APP_ID = '33foZ7HWr4EtrGdgYHDyM';

function linkAccount() {
    const redirect = encodeURIComponent('https://oracle-app-taupe.vercel.app/');

    const authUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${redirect}`;
